services:
  postgres:
    image: docker.io/postgres:18-alpine
    environment:
      POSTGRES_DB: pgxsinkit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${PGXSINKIT_POSTGRES_PORT:-54321}:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    volumes:
      - ../sql/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgxsinkit"]
      interval: 5s
      timeout: 5s
      retries: 20

  electric:
    image: docker.io/electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/pgxsinkit?sslmode=disable
      ELECTRIC_INSECURE: "true"
      ELECTRIC_ENABLE_INTEGRATION_TESTING: "true"
    ports:
      - "${PGXSINKIT_ELECTRIC_PORT:-3000}:3000"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
