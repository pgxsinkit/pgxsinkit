services:
  postgres:
    image: docker.io/supabase/postgres:17.6.1.116
    volumes:
      - ./entrypoint-masks/init-scripts:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${PGXSINKIT_INTEGRATION_POSTGRES_USER:-supabase_admin}
      POSTGRES_PASSWORD: ${PGXSINKIT_INTEGRATION_POSTGRES_PASSWORD:-your-super-secret-and-long-postgres-password}
      POSTGRES_DB: ${PGXSINKIT_INTEGRATION_POSTGRES_DB:-postgres}
      POSTGRES_INITDB_SKIP_SCRIPTS: ${PGXSINKIT_INTEGRATION_POSTGRES_SKIP_INIT_SCRIPTS:-false}
    ports:
      - "${PGXSINKIT_INTEGRATION_POSTGRES_PORT:-54321}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${PGXSINKIT_INTEGRATION_POSTGRES_USER:-supabase_admin} -d ${PGXSINKIT_INTEGRATION_POSTGRES_DB:-postgres}
      interval: 2s
      timeout: 3s
      retries: 20

  electric:
    image: docker.io/electricsql/electric:1.7.3
    environment:
      DATABASE_URL: postgresql://supabase_admin:your-super-secret-and-long-postgres-password@postgres:5432/postgres?sslmode=disable
      ELECTRIC_INSECURE: "true"
      ELECTRIC_ENABLE_INTEGRATION_TESTING: "true"
      # Preview feature: cross-table subquery `where` clauses in shapes (Electric 1.6+).
      # Required for membership-style row filters of the form
      # `container_id IN (SELECT container_id FROM memberships WHERE member_id = <sub>)`.
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    ports:
      - "${PGXSINKIT_ELECTRIC_PORT:-3000}:3000"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
