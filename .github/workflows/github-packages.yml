name: GitHub Packages

# Mirrors the @pgxsinkit/* packages to the GitHub Packages npm registry (npm.pkg.github.com).
# This is the INTERNAL channel — GitHub Packages requires auth even to install, so it is for
# authenticated same-org consumers (e.g. the emergent app), not the public. npmjs.com stays the
# public-facing registry.
#
# NOTE: GitHub Packages requires the npm scope to equal the repo owner, so this only works once the
# repo lives under a `pgxsinkit` GitHub org (scope @pgxsinkit == owner pgxsinkit).
#
#   push to main  -> dev channel:    <version>-dev.<shortSha>  @ dist-tag `dev`
#   semver tag    -> release parity: the tagged version        @ dist-tag `latest`
#
# Publishing is gated on validation (ADR-0016 §7): the dev publish needs `validate:full`; a release
# (tag) additionally needs `test:integration`. The npm mirror is a separate, human-gated step
# (`bun run release:npm <tag>`), never run here.
on:
  push:
    branches: [main]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:

concurrency:
  group: gh-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run validate:full
      # The ADR-0032 S3 browser lane (part of test:integration) drives a real Chromium against the board's
      # caddy TLS front. On this throwaway runner, install mkcert + register its CA in the system/NSS trust
      # store so both `infra:up`'s cert issuance and Playwright's Chromium accept https://localhost:54343,
      # and install the Chromium the lane uses. Tag-gated, alongside the integration run itself.
      - name: Trust a local mkcert CA for the browser lane (release only)
        if: github.ref_type == 'tag'
        # Chromium on Linux trusts the USER NSS DB (~/.pki/nssdb), not the system store; the runner has
        # none and `mkcert -install` silently skips NSS when none exists — create it first, then verify
        # the CA landed. Same fix as ci.yml's browser-lane (run 28689039197).
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-tools mkcert
          mkdir -p "$HOME/.pki/nssdb"
          certutil -d "sql:$HOME/.pki/nssdb" -N --empty-password
          mkcert -install
          certutil -d "sql:$HOME/.pki/nssdb" -L | grep -i mkcert
      - name: Install Playwright Chromium (release only)
        if: github.ref_type == 'tag'
        run: bunx playwright install --with-deps chromium
      # GH runners ship podman but never start its rootless API socket, and `podman compose` (which the
      # infra scripts use) delegates to the docker-compose provider OVER that socket — without it every
      # container-backed integration lane dies at its first compose call. Same fix as ci.yml's browser-lane.
      - name: Start the rootless podman API socket (release only)
        if: github.ref_type == 'tag'
        run: |
          podman system service --time=0 &
          SOCK="/run/user/$(id -u)/podman/podman.sock"
          for _ in $(seq 1 60); do [ -S "$SOCK" ] && break; sleep 0.5; done
          [ -S "$SOCK" ] || { echo "podman API socket never appeared at $SOCK"; exit 1; }
      # The compose stacks publish host ports 54321–54343 — inside Linux's ephemeral range — so a runner's
      # own outbound connections can transiently occupy one and `compose up` fails to bind. Same fix as
      # ci.yml's browser-lane (flake reference: run 29227659330).
      - name: Reserve the compose stacks' host ports against ephemeral allocation (release only)
        if: github.ref_type == 'tag'
        run: sudo sysctl -w net.ipv4.ip_local_reserved_ports=54321-54343
      - name: Integration tests (release only)
        if: github.ref_type == 'tag'
        run: bun run test:integration
      # Same rationale as ci.yml's browser-lane: the Playwright traces retained on failure are the only
      # way to diagnose a runner-only failure, and they die with the runner unless uploaded.
      - name: Upload Playwright traces on failure (release only)
        if: failure() && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: browser-lane-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # fetch all tags so the dev channel can sort above the latest release
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run build:public-packages
      # Write .npmrc so the publish step (`scripts/publish-github-packages.ts`) can authenticate to
      # GitHub Packages (npm.pkg.github.com). This MUST come after `bun install`: the scope-registry
      # line reroutes EVERY @pgxsinkit spec — including the @electric-sql/pglite fork alias, which
      # installs from public npm and whose bun.lock entry has an empty (default-registry) source —
      # so an .npmrc written before the install sends the fork's tarball fetch to GitHub Packages,
      # which 404s the npmjs-style path (observed at pin 0.5.4-pgx.10, run 29799463427).
      - name: Configure GitHub Packages registry + auth (publish only)
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "@pgxsinkit:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}"
          } >> .npmrc
      - name: Publish to GitHub Packages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: bun run scripts/publish-github-packages.ts
